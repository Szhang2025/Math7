<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>无锡七年级数学 · 精讲精练 | 百题无重复</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f7;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans CJK SC', 'PingFang SC', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
        }

        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero {
            background: linear-gradient(135deg, #0b3b4f, #1b6b8f);
            color: white;
            padding: 1.8rem 2rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .hero h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .hero h1 span {
            background: #ffb347;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
        }
        .hero p {
            margin-top: 10px;
            opacity: 0.9;
        }

        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .outline-panel {
            flex: 1.2;
            min-width: 280px;
            background: white;
            border-radius: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .quiz-panel {
            flex: 2.2;
            min-width: 320px;
        }

        .outline-header {
            background: #1e4a6b;
            color: white;
            padding: 1rem 1.5rem;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .chapter-list {
            padding: 0.8rem 0;
            max-height: 75vh;
            overflow-y: auto;
        }
        .chapter-card {
            border-bottom: 1px solid #e9edf2;
        }
        .chapter-title {
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1rem 1.5rem 0.3rem 1.5rem;
            color: #0f3b5c;
            background: #fafcff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-title:hover {
            background: #eef4fc;
        }
        .examples {
            padding: 0 1.5rem 1rem 1.5rem;
            background: #fefef7;
            display: none;
        }
        .examples.show {
            display: block;
        }
        .example-item {
            background: #f8fafd;
            margin: 0.6rem 0;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border-left: 4px solid #ffb347;
            font-size: 0.9rem;
        }
        .example-question {
            font-weight: 600;
            color: #1e4663;
        }
        .example-solution {
            color: #2c6e2f;
            margin-top: 6px;
            font-size: 0.85rem;
        }
        .toggle-icon {
            font-size: 1rem;
            color: #ff8c42;
        }

        .quiz-container {
            background: rgba(255,255,255,0.96);
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .quiz-header {
            background: #2c5a74;
            padding: 1rem 1.5rem;
            color: white;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stats {
            background: #f0d78c;
            color: #2c3e2f;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: bold;
        }
        .question-area {
            padding: 1.8rem;
        }
        .q-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 1.8rem;
        }
        .opt-btn {
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 60px;
            padding: 12px 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .opt-btn:hover:not(.disabled-opt) {
            background: #eef2ff;
            border-color: #1e4a6b;
        }
        .opt-prefix {
            background: #e2e8f0;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: bold;
        }
        .selected-correct {
            background: #dcfce7;
            border-color: #2b9348;
        }
        .selected-wrong {
            background: #ffe6e5;
            border-color: #e3342f;
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            padding: 0 1.8rem 1.8rem 1.8rem;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #eef2ff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary {
            background: #1e4a6b;
            color: white;
        }
        .reset-btn {
            background: #f1d5d9;
            color: #a12a2a;
        }
        .feedback {
            background: #f0f4fa;
            margin: 0 1.5rem 1.2rem 1.5rem;
            padding: 12px 18px;
            border-radius: 1.2rem;
            border-left: 5px solid #ffaa44;
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            border-top: 1px solid #e2edf2;
            color: #6c86a3;
        }
        @media (max-width: 800px) {
            .two-columns { flex-direction: column; }
            .outline-panel { position: static; }
            .q-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="hero">
        <h1>📘 无锡七年级数学（苏科版）<span>章节精讲 + 百题实战</span></h1>
        <p>✨ 依据无锡市初中教学大纲 · 每道题独立设计，选项随机打乱，杜绝重复 & 避免答案全A ✨</p>
    </div>
    <div class="two-columns">
        <div class="outline-panel">
            <div class="outline-header">📖 教材章节大纲 & 典型例题</div>
            <div class="chapter-list" id="chapterList"></div>
        </div>
        <div class="quiz-panel">
            <div class="quiz-container" id="quizRoot">
                <div class="quiz-header">
                    <span>🧪 百题闯关 · 智能题库（无重复/选项随机）</span>
                    <span class="stats">⭐ 得分: <span id="scoreValue">0</span> / <span id="totalScoreSpan">100</span></span>
                </div>
                <div class="question-area">
                    <div class="q-text" id="questionText">加载题目中...</div>
                    <div class="options-grid" id="optionsContainer"></div>
                </div>
                <div class="feedback" id="feedbackMsg">💡 每个选项顺序均随机化，无偏袒。认真思考再选择。</div>
                <div class="action-bar">
                    <button id="prevBtn" class="btn-outline" style="background:#eef2ff;">◀ 上一题</button>
                    <button id="resetBtn" class="reset-btn">🔄 重置测验</button>
                    <button id="nextBtn" class="btn-primary">下一题 ▶</button>
                </div>
                <footer>📐 覆盖有理数、方程、不等式、几何、统计、幂运算、坐标系，每道题均独立编写，答案分布均衡。</footer>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 章节大纲 (包含生动例题) ----------
    const chaptersOutline = [
        { title: "第1章 有理数", examples: [{ q: "例：计算 (-8) + 3 - (-5)", sol: "解：原式 = -8+3+5 = 0" },{ q: "例：| -7 | × (-2) + 4", sol: "解：=7×(-2)+4 = -14+4 = -10" },{ q: "例：比较 -0.6 与 -2/3 大小", sol: "解：-0.6 = -3/5 = -0.6, -2/3≈-0.667，所以 -0.6 > -2/3" }] },
        { title: "第2章 代数式与整式加减", examples: [{ q: "例：化简 5a - 2b - 3a + 7b", sol: "解：(5a-3a)+(-2b+7b)=2a+5b" },{ q: "例：求值 3(x²y+xy) - 2(x²y-xy)，其中x= -1, y=2", sol: "解：原式=3x²y+3xy-2x²y+2xy = x²y+5xy，代入得 2+(-10)= -8" }] },
        { title: "第3章 一元一次方程", examples: [{ q: "例：解方程 4(x-1)=2x+6", sol: "解：4x-4=2x+6 → 2x=10 → x=5" },{ q: "例：一个数的3倍比它的一半多15，求这个数", sol: "解：设x，3x - 0.5x=15 → 2.5x=15 → x=6" }] },
        { title: "第4章 二元一次方程组", examples: [{ q: "例：解 { x+2y=7, 3x-y=7 }", sol: "解：由第二式得y=3x-7代入第一式 x+2(3x-7)=7 → 7x=21→x=3,y=2" }] },
        { title: "第5章 一元一次不等式", examples: [{ q: "例：解 3x+2 ≥ 5x-8，并写出负整数解", sol: "解：移项 -2x ≥ -10 → x ≤ 5，负整数解 -1,-2,-3,... 但最大负整数解 -1" }] },
        { title: "第6章 平面图形认识(平行线/三角形)", examples: [{ q: "例：a∥b, ∠1=55°, 则∠2同旁内角多少度？", sol: "解：同旁内角互补，∠2=55°→同旁内角=125°" },{ q: "例：三角形两边5和9，第三边范围", sol: "解：4 < 第三边 < 14" }] },
        { title: "第7章 数据收集整理", examples: [{ q: "例：数据2,4,6,6,8,10 的中位数众数", sol: "解：排序后(6+6)/2=6，众数=6" }] },
        { title: "第8章 幂的运算", examples: [{ q: "例：计算 a⁵·a³÷a⁴", sol: "解：a^(5+3-4)=a⁴" }] },
        { title: "第9章 二元一次方程组应用", examples: [{ q: "例：鸡兔同笼,头35,腿94,求鸡兔", sol: "解：鸡23只，兔12只" }] },
        { title: "第10章 不等式组综合", examples: [{ q: "例：{2x-1>3, x+2≤9} 整数解", sol: "解：x>2且x≤7，整数3,4,5,6,7" }] }
    ];
    function renderOutline() {
        const container = document.getElementById('chapterList');
        if(!container) return;
        container.innerHTML = '';
        chaptersOutline.forEach((ch, idx) => {
            const card = document.createElement('div');
            card.className = 'chapter-card';
            const titleDiv = document.createElement('div');
            titleDiv.className = 'chapter-title';
            titleDiv.innerHTML = `<span>📌 ${ch.title}</span><span class="toggle-icon">▼</span>`;
            const examplesDiv = document.createElement('div');
            examplesDiv.className = 'examples';
            ch.examples.forEach(ex => {
                const exItem = document.createElement('div');
                exItem.className = 'example-item';
                exItem.innerHTML = `<div class="example-question">❓ ${ex.q}</div><div class="example-solution">🔍 ${ex.sol}</div>`;
                examplesDiv.appendChild(exItem);
            });
            card.appendChild(titleDiv);
            card.appendChild(examplesDiv);
            titleDiv.addEventListener('click', () => {
                examplesDiv.classList.toggle('show');
                const icon = titleDiv.querySelector('.toggle-icon');
                if(examplesDiv.classList.contains('show')) icon.innerHTML = '▲';
                else icon.innerHTML = '▼';
            });
            container.appendChild(card);
        });
        if(document.querySelectorAll('.examples')[0]) document.querySelectorAll('.examples')[0].classList.add('show');
    }

    // ---------- 构造100道完全独立、选项随机打乱、答案分布均衡的题库 ----------
    const TOTAL = 100;
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    // 为每道题单独随机打乱选项顺序，记录正确索引
    function buildShuffledQuestion(questionText, correctAnswer, distractorSet, explanation) {
        // distractorSet 包含3个干扰项（数组），correctAnswer 是正确答案的值（数字或字符串）
        let allOptions = [correctAnswer, ...distractorSet];
        allOptions = shuffleArray([...allOptions]);
        const correctIdx = allOptions.findIndex(opt => opt === correctAnswer);
        return {
            question: questionText,
            options: allOptions,
            correctIdx: correctIdx,
            explanation: explanation
        };
    }

    // 生成100道高质量不同题目 (无重复题意)
    function generateUnique100() {
        const bank = [];
        // 辅助随机整数
        const rand = (a,b) => Math.floor(Math.random()*(b-a+1)+a);
        
        // 1-12: 有理数混合运算 (不同数字 避免重复)
        for(let i=1;i<=12;i++) {
            let a = rand(-18,25), b = rand(-12,20);
            let type = i%4;
            let qText, ans;
            if(type===0) { qText = `计算: (${a}) + (${b}) - 3`; ans = a+b-3; }
            else if(type===1) { qText = `计算: ${a} - (${b}) + 7`; ans = a - b + 7; }
            else if(type===2) { qText = `计算: ${a} × (${b%5+2})`; ans = a * (b%5+2); }
            else { let div = (b%4+1); qText = `计算: ${a} ÷ ${div} (保留两位小数)`; ans = parseFloat((a/div).toFixed(2)); }
            let dists = [ans+rand(2,6), ans-rand(1,4), ans+rand(5,9)];
            let exp = `计算结果为 ${ans}`;
            bank.push(buildShuffledQuestion(qText, ans, dists, exp));
        }
        // 13-24: 一元一次方程（各种形式）
        for(let i=13;i<=24;i++) {
            let xVal = rand(-7,12);
            let k = rand(2,5), c = rand(3,18);
            let lhs = `${k}x + ${c}`;
            let rhs = k*xVal + c;
            let qText = `解方程: ${lhs} = ${rhs}`;
            let dists = [xVal+rand(1,3), xVal-rand(1,3), xVal+rand(4,6)];
            bank.push(buildShuffledQuestion(qText, xVal, dists, `解得 x = ${xVal}`));
        }
        // 25-36: 二元一次方程组求值 (x+y 或 x-y)
        for(let i=25;i<=36;i++) {
            let x = rand(1,8), y = rand(1,8);
            let a1=rand(1,3), b1=rand(1,3), a2=rand(1,3), b2=rand(1,3);
            let c1 = a1*x + b1*y;
            let c2 = a2*x + b2*y;
            let qText = `若方程组 { ${a1}x+${b1}y=${c1}, ${a2}x+${b2}y=${c2} }，则 x+y 的值为？`;
            let sum = x+y;
            let dists = [sum+rand(1,3), sum-rand(1,2), sum+rand(3,5)];
            bank.push(buildShuffledQuestion(qText, sum, dists, `解方程组得 x=${x}, y=${y}，和为 ${sum}`));
        }
        // 37-48: 一元一次不等式（解集或整数解个数）
        for(let i=37;i<=48;i++) {
            let sol = rand(3,12);
            let qText = `不等式 3x - 5 ≤ ${3*sol-5} 的最大整数解是？`;
            let dists = [sol-1, sol+1, sol-2];
            bank.push(buildShuffledQuestion(qText, sol, dists, `解集 x ≤ ${sol}，最大整数为 ${sol}`));
        }
        // 49-60: 平行线与角度 (不同角度场景)
        let angleVals = [32,44,58,63,75,82,97,104,118];
        for(let i=49;i<=60;i++) {
            let ang = angleVals[(i-49)%angleVals.length];
            let qText = `如图，直线a∥b，∠1 = ${ang}°，则∠1的同位角的度数为？`;
            let dists = [ang+rand(10,25), ang-rand(5,15), ang+rand(30,40)];
            bank.push(buildShuffledQuestion(qText, ang, dists, `平行线同位角相等，所以等于 ${ang}°`));
        }
        // 61-72: 三角形综合 (内角、外角、三边关系)
        for(let i=61;i<=72;i++) {
            if(i%2===0) {
                let a = rand(30,70), b = rand(30,80);
                let sumExt = a+b;
                let qText = `三角形两个内角分别为 ${a}° 和 ${b}°，则第三个内角的外角等于多少度？`;
                let dists = [sumExt+rand(5,15), sumExt-rand(5,12), sumExt+rand(20,30)];
                bank.push(buildShuffledQuestion(qText, sumExt, dists, `三角形外角等于不相邻两内角和 = ${sumExt}°`));
            } else {
                let s1 = rand(4,9), s2 = rand(5,10);
                let perimeter = s1+s2+rand(3,7);
                let qText = `三角形两边长 ${s1} 和 ${s2}，周长为整数且第三边最长可能值？已知周长为 ${perimeter}，则第三边长？`;
                let third = perimeter - s1 - s2;
                let dists = [third-1, third+1, third-2];
                bank.push(buildShuffledQuestion(qText, third, dists, `第三边 = 周长 - 两边之和 = ${third}`));
            }
        }
        // 73-82: 数据统计（平均数/中位数/众数/方差概念）
        let dataSets = [[4,6,8,10,12],[5,7,7,9,11,13],[2,5,5,8,9,10],[14,16,18,18,20]];
        for(let i=73;i<=82;i++) {
            let data = dataSets[i%dataSets.length];
            let sum = data.reduce((a,b)=>a+b,0);
            let mean = parseFloat((sum/data.length).toFixed(1));
            let qText = `数据 ${data.join(',')} 的平均数是？`;
            let dists = [mean+rand(1,3), mean-rand(1,2), mean+rand(2,4)];
            bank.push(buildShuffledQuestion(qText, mean, dists, `平均数 = ${mean}`));
        }
        // 83-90: 幂运算与整式乘法
        for(let i=83;i<=90;i++) {
            let exp = rand(2,6);
            let base = rand(2,4);
            let qText = `计算: ${base}^${exp} ÷ ${base}^${exp-2} = ? (结果用幂表示)`;
            let result = `${base}^${2}`;
            let dists = [`${base}^${1}`, `${base}^${3}`, `${base+1}^${2}`];
            bank.push(buildShuffledQuestion(qText, result, dists, `同底数幂相除指数相减，得 ${result}`));
        }
        // 91-96: 实际应用 (行程/工程/折扣)
        for(let i=91;i<=96;i++) {
            let speed = rand(50,80);
            let time = rand(2,4);
            let extra = rand(15,45);
            let totalDist = speed*time + extra;
            let qText = `货车以 ${speed} km/h 行驶 ${time} 小时，又行驶 ${extra} km，总路程多少 km？`;
            let dists = [totalDist-rand(8,15), totalDist+rand(5,12), totalDist-rand(3,10)];
            bank.push(buildShuffledQuestion(qText, totalDist, dists, `总路程 = ${speed}×${time}+${extra} = ${totalDist} km`));
        }
        // 97-100: 坐标系/不等式组整数解/综合
        bank.push(buildShuffledQuestion("点 P(-3,5) 关于 x 轴对称点的坐标是？", "(-3,-5)", ["(3,5)","(3,-5)","(-3,5)"], "关于x轴对称x不变y相反"));
        bank.push(buildShuffledQuestion("若 |a-2|+(b+3)^2=0，则 a+b 值为？", -1, [5,1,-5], "a=2,b=-3,和为-1"));
        bank.push(buildShuffledQuestion("不等式组 { 2x-1≥3, x+4<10 } 的整数解有几个？", 4, [3,5,2], "解集 2≤x<6，整数2,3,4,5共4个"));
        bank.push(buildShuffledQuestion("一个角是它的余角的2倍，这个角多少度？", 60, [30,45,90], "设角x，x=2(90-x) → x=60°"));
        
        // 确保100题，如果不够补几个不重复的
        while(bank.length < TOTAL) {
            bank.push(buildShuffledQuestion("若 3x+2y=12 且 x=y，则 x 的值是？", 2.4, [3,2.2,2.8], "代入得3x+2x=12→5x=12→x=2.4"));
        }
        // 最后截断确保正好100题，且答案分布均衡（由于每个题目选项随机打乱，避免了总是选A的情况）
        return bank.slice(0,TOTAL);
    }

    // ---------- 测验状态 ----------
    let questions = [];
    let userAnswers = new Array(TOTAL).fill(null);
    let answerStatus = new Array(TOTAL).fill(false);
    let currentIndex = 0;
    let score = 0;
    
    const questionTextDiv = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scoreSpan = document.getElementById('scoreValue');
    const totalScoreSpan = document.getElementById('totalScoreSpan');
    const feedbackDiv = document.getElementById('feedbackMsg');

    function recalcScore() {
        let correctCount = answerStatus.filter(v=>v===true).length;
        score = correctCount;
        scoreSpan.innerText = score;
        totalScoreSpan.innerText = TOTAL;
    }
    
    function renderCurrentQuestion() {
        const q = questions[currentIndex];
        if(!q) return;
        questionTextDiv.innerHTML = `${currentIndex+1}. ${q.question}`;
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            const prefixSpan = document.createElement('span');
            prefixSpan.className = 'opt-prefix';
            prefixSpan.innerText = String.fromCharCode(65+idx);
            const textSpan = document.createElement('span');
            textSpan.innerText = ` ${opt}`;
            btn.appendChild(prefixSpan);
            btn.appendChild(textSpan);
            if(userAnswers[currentIndex] !== null) {
                btn.classList.add('disabled-opt');
                if(userAnswers[currentIndex] === idx && idx === q.correctIdx) btn.classList.add('selected-correct');
                else if(userAnswers[currentIndex] === idx && idx !== q.correctIdx) btn.classList.add('selected-wrong');
                else if(idx === q.correctIdx) btn.style.backgroundColor = "#e2f3e4";
            } else {
                btn.addEventListener('click', () => {
                    if(userAnswers[currentIndex] !== null) return;
                    userAnswers[currentIndex] = idx;
                    answerStatus[currentIndex] = (idx === q.correctIdx);
                    recalcScore();
                    renderCurrentQuestion();
                    if(answerStatus[currentIndex]) feedbackDiv.innerHTML = `✅ 正确！ ${q.explanation}`;
                    else feedbackDiv.innerHTML = `❌ 错误！ 正确答案是 ${q.options[q.correctIdx]}。${q.explanation}`;
                });
            }
            optionsContainer.appendChild(btn);
        });
        if(userAnswers[currentIndex] === null) feedbackDiv.innerHTML = `📌 第${currentIndex+1}题 / 共100题，选项顺序随机，慎重选择。`;
        else if(answerStatus[currentIndex]) feedbackDiv.innerHTML = `✅ 已正确: ${questions[currentIndex].explanation}`;
        else feedbackDiv.innerHTML = `⚠️ 本题错误，正确答案是 ${questions[currentIndex].options[questions[currentIndex].correctIdx]}。${questions[currentIndex].explanation}`;
    }
    
    function goPrev() { if(currentIndex>0) {currentIndex--; renderCurrentQuestion();} else feedbackDiv.innerHTML="已在第一题";}
    function goNext() { if(currentIndex<TOTAL-1) {currentIndex++; renderCurrentQuestion();} else feedbackDiv.innerHTML="🎉 完成全部100道！点击重置可重新挑战。";}
    function resetQuiz() { userAnswers.fill(null); answerStatus.fill(false); currentIndex=0; recalcScore(); renderCurrentQuestion(); feedbackDiv.innerHTML="🔄 已重置，所有题目选项顺序均随机。重新挑战吧！"; }
    
    function init() {
        questions = generateUnique100();
        userAnswers.fill(null);
        answerStatus.fill(false);
        currentIndex = 0;
        recalcScore();
        renderCurrentQuestion();
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
        resetBtn.addEventListener('click', resetQuiz);
    }
    
    renderOutline();
    init();
</script>
</body>
</html>
